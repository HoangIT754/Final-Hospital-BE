# ============================
# Application config
# ============================
spring.application.name=backend-hospital
server.port=9092

# ============================
# Database config
# ============================
spring.datasource.url=jdbc:postgresql://26.62.34.191:5435/application
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================
# Redis config
# ============================
spring.data.redis.host=redis-cache
spring.data.redis.port=6379

# ============================
# Keycloak config
# ============================
keycloak.realm=hospital-realm
keycloak.auth-server-url=http://26.62.34.191:9091
keycloak.resource=hospital-client-keycloak-be
keycloak.credentials.secret=${KEYCLOAK_SECRET}
keycloak.public-client=false
keycloak.admin-username=${KEYCLOAK_ADMIN_USERNAME}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD}

# ============================
# Security Configuration
# ============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://26.62.34.191:9091/realms/hospital-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://26.62.34.191:9091/realms/hospital-realm/protocol/openid-connect/certs

# ============================
# JWT Configuration
# ============================
jwt.auth.converter.resource-id=hospital
jwt.auth.converter.principal-attribute=preferred_username
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# ============================
# Cloudinary Configuration
# ============================
cloudinary.cloud-name=dhpke1vua
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.secure=true

# ============================
# Logging
# ============================
logging.level.org.springframework.security=INFO

# ============================
# Momo Configuration
# ============================
momo.partner-code=MOMOXXXX2020
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.redirect-url=https://your-frontend/payment-result
momo.ipn-url=https://your-backend/api/v1/app/payment/momo/callback